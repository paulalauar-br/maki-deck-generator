<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maki Deck Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f4;
      min-height: 100vh;
      padding: 40px 16px;
      color: #1a1a1a;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #1a3a2a;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 6px;
      color: #5a7a6a;
      font-size: 15px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      padding: 36px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1a3a2a;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8f5e9;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-row.three { grid-template-columns: 1fr 1fr 1fr; }
    .field-row.single { grid-template-columns: 1fr; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: #2d4a3a;
    }

    label span.req { color: #c0392b; margin-left: 2px; }

    input[type="text"],
    input[type="file"] {
      padding: 10px 12px;
      border: 1.5px solid #d0ddd5;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafcfa;
      transition: border 0.2s;
      width: 100%;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #1a3a2a;
      background: #fff;
    }

    input[type="file"] {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #5a7a6a;
    }

    /* Stages table */
    .stages-header {
      display: grid;
      grid-template-columns: 180px 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 8px;
      padding: 0 4px;
    }

    .stages-header span {
      font-size: 12px;
      font-weight: 700;
      color: #5a7a6a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stage-row {
      display: grid;
      grid-template-columns: 180px 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    .stage-label {
      font-size: 13px;
      font-weight: 600;
      color: #1a3a2a;
      background: #e8f5e9;
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.3;
    }

    .stage-row input {
      padding: 10px 12px;
      border: 1.5px solid #d0ddd5;
      border-radius: 8px;
      font-size: 13px;
      background: #fafcfa;
      width: 100%;
      transition: border 0.2s;
    }

    .stage-row input:focus {
      outline: none;
      border-color: #1a3a2a;
      background: #fff;
    }

    /* Generate button */
    .generate-wrap {
      text-align: center;
      margin-top: 8px;
    }

    button#generateBtn {
      background: #1a3a2a;
      color: #fff;
      border: none;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }

    button#generateBtn:hover { background: #2d5a3a; }
    button#generateBtn:active { transform: scale(0.98); }
    button#generateBtn:disabled { background: #a0b8a8; cursor: not-allowed; }

    #status {
      margin-top: 20px;
      text-align: center;
      font-size: 15px;
      min-height: 28px;
    }

    #status.loading { color: #5a7a6a; }
    #status.success { color: #1a6a3a; font-weight: 600; }
    #status.error   { color: #c0392b; font-weight: 600; }

    #deckLink {
      display: none;
      margin-top: 14px;
      text-align: center;
    }

    #deckLink a {
      display: inline-block;
      background: #e8f5e9;
      color: #1a3a2a;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      border: 1.5px solid #b0d8b8;
      transition: background 0.2s;
    }

    #deckLink a:hover { background: #d0ecd8; }

    @media (max-width: 620px) {
      .field-row, .field-row.three { grid-template-columns: 1fr; }
      .stages-header, .stage-row { grid-template-columns: 1fr; }
      .stages-header { display: none; }
      .stage-label { margin-bottom: 4px; }
      .card { padding: 24px 18px; }
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <h1>Maki Deck Generator</h1>
    <p>Generate customized client decks in seconds</p>
  </header>

  <!-- Section 1: Client Info -->
  <div class="card">
    <div class="section-title">Client Information</div>

    <div class="field-row">
      <div class="field">
        <label>Client Name <span class="req">*</span></label>
        <input type="text" id="client_name" placeholder="e.g. Acme Corp" />
      </div>
      <div class="field">
        <label>Year <span class="req">*</span></label>
        <input type="text" id="year" placeholder="e.g. 2026" />
      </div>
    </div>

    <div class="field-row single">
      <div class="field">
        <label>Roles Covered <span class="req">*</span></label>
        <input type="text" id="roles" placeholder="e.g. Sales, Support, HR" />
      </div>
    </div>

    <div class="field-row single">
      <div class="field">
        <label>Client Logo <span style="color:#5a7a6a; font-weight:400">(PNG or JPG)</span></label>
        <input type="file" id="logo" accept=".png,.jpg,.jpeg" />
      </div>
    </div>
  </div>

  <!-- Section 2: Project Stages -->
  <div class="card">
    <div class="section-title">Project Stages</div>

    <div class="stages-header">
      <span>Stage</span>
      <span>Date</span>
      <span>Maki Owner</span>
      <span>Client Owner</span>
    </div>

    <!-- Row template repeated for each stage -->
    <div class="stage-row">
      <div class="stage-label">Project Governance</div>
      <input type="text" id="date_governance" placeholder="e.g. Jan 2026" />
      <input type="text" id="maki_governance" placeholder="Name" />
      <input type="text" id="client_governance" placeholder="Name" />
    </div>

    <div class="stage-row">
      <div class="stage-label">Design</div>
      <input type="text" id="date_design" placeholder="e.g. Feb 2026" />
      <input type="text" id="maki_design" placeholder="Name" />
      <input type="text" id="client_design" placeholder="Name" />
    </div>

    <div class="stage-row">
      <div class="stage-label">Testing</div>
      <input type="text" id="date_testing" placeholder="e.g. Mar 2026" />
      <input type="text" id="maki_testing" placeholder="Name" />
      <input type="text" id="client_testing" placeholder="Name" />
    </div>

    <div class="stage-row">
      <div class="stage-label">Go-live!</div>
      <input type="text" id="date_golive" placeholder="e.g. Apr 2026" />
      <input type="text" id="maki_golive" placeholder="Name" />
      <input type="text" id="client_golive" placeholder="Name" />
    </div>

    <div class="stage-row">
      <div class="stage-label">Iteration & Scaling</div>
      <input type="text" id="date_iteration" placeholder="e.g. May 2026" />
      <input type="text" id="maki_iteration" placeholder="Name" />
      <input type="text" id="client_iteration" placeholder="Name" />
    </div>

    <div class="stage-row">
      <div class="stage-label">Impact</div>
      <input type="text" id="date_impact" placeholder="e.g. Jun 2026" />
      <input type="text" id="maki_impact" placeholder="Name" />
      <input type="text" id="client_impact" placeholder="Name" />
    </div>
  </div>

  <!-- Section 3: Generate -->
  <div class="card">
    <div class="generate-wrap">
      <button id="generateBtn" onclick="generateDeck()">Generate Deck</button>
      <div id="status"></div>
      <div id="deckLink"><a id="deckAnchor" href="#" target="_blank">Open your deck →</a></div>
    </div>
  </div>

</div>

<script>
  // Pre-fill year
  document.getElementById("year").value = new Date().getFullYear();

  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrifZfWmYlffpgos4wfSQ6Jb4VTER4zWxyquLCNDv0Y6MXiRcKIu34cOtheQ08ACv2/exec";

  function val(id) {
    return document.getElementById(id).value.trim();
  }

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = type;
  }

  function generateDeck() {
    // Validate required fields
    if (!val("client_name") || !val("year") || !val("roles")) {
      setStatus("⚠️ Please fill in Client Name, Year, and Roles before generating.", "error");
      return;
    }

    const btn = document.getElementById("generateBtn");
    btn.disabled = true;
    document.getElementById("deckLink").style.display = "none";
    setStatus("Generating your deck...", "loading");

    const logoFile = document.getElementById("logo").files[0];

    if (logoFile) {
      const reader = new FileReader();
      reader.onload = function(e) {
        const base64 = e.target.result.split(",")[1];
        sendRequest(base64, logoFile.type);
      };
      reader.readAsDataURL(logoFile);
    } else {
      sendRequest("", "");
    }
  }

  function sendRequest(logoBase64, logoMime) {
    const payload = {
      template_key:       "next_steps",
      client_name:        val("client_name"),
      year:               val("year"),
      roles:              val("roles"),
      logo_base64:        logoBase64,
      logo_mime_type:     logoMime,
      date_governance:    val("date_governance"),
      maki_governance:    val("maki_governance"),
      client_governance:  val("client_governance"),
      date_design:        val("date_design"),
      maki_design:        val("maki_design"),
      client_design:      val("client_design"),
      date_testing:       val("date_testing"),
      maki_testing:       val("maki_testing"),
      client_testing:     val("client_testing"),
      date_golive:        val("date_golive"),
      maki_golive:        val("maki_golive"),
      client_golive:      val("client_golive"),
      date_iteration:     val("date_iteration"),
      maki_iteration:     val("maki_iteration"),
      client_iteration:   val("client_iteration"),
      date_impact:        val("date_impact"),
      maki_impact:        val("maki_impact"),
      client_impact:      val("client_impact")
    };

    fetch(SCRIPT_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
      const btn = document.getElementById("generateBtn");
      btn.disabled = false;
      if (data.success) {
        setStatus("✅ Deck created successfully!", "success");
        const linkDiv = document.getElementById("deckLink");
        const anchor  = document.getElementById("deckAnchor");
        anchor.href = data.deck_url;
        linkDiv.style.display = "block";
      } else {
        setStatus("❌ Something went wrong: " + (data.error || "unknown error"), "error");
      }
    })
    .catch(err => {
      document.getElementById("generateBtn").disabled = false;
      setStatus("❌ Could not reach the server. Please try again.", "error");
    });
  }
</script>
</body>
</html>
